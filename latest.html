///
function throttled (delay, cb) {
let shouldWait = false
let waitingArgs

const timeoutFunc = () => {
		if (waitingArgs == null) {
				shouldWait = false
		} else {
		cb(...waitingArgs)
		waitingArgs = null
		setTimeout(timeoutFunc, delay)
		}
}
return (...args) => {
		if (shouldWait) {
		waitingArgs = args
		return
		}
		cb(...args)
		shouldWait = true
		setTimeout(timeoutFunc, delay)
}
}

os.ripple = function (parent = "body") {
  // Determine the actual parent element
  const parentElm = typeof parent === "string" ? document.querySelector(parent) : parent;
  if (!parentElm) return; // Exit if parent is not found
  
  const waves = parentElm.querySelectorAll('[w]');
  
  waves.forEach(function (wave) {
    // Remove existing listeners if already added
    if (wave._rippleHandlers) {
      wave.removeEventListener("touchstart", wave._rippleHandlers.touchstart);
      wave.removeEventListener("touchmove", wave._rippleHandlers.touchmove);
      wave.removeEventListener("touchend", wave._rippleHandlers.touchend);
      wave.removeEventListener("touchcancel", wave._rippleHandlers.touchcancel);
      wave.removeEventListener("click", wave._rippleHandlers.click);
      delete wave._rippleHandlers;
    }
    
    // Skip if already activated using custom logic
    if (!wave.ath("wactive")) {
      let currentRipple = null;
      let touchStarted = false;
      let touchMoved = false;
      let touchOccurred = false; // Track if any touch event happened recently
      let touchCancelTimer = null;
      
      const createRipple = function (e, touch = false) {
        const element = this;
        element.ats("wactive");
        
        const ripple = document.createElement('ripple');
        const id = 'wave-' + new Date().getTime();
        ripple.setAttribute('id', id);
        ripple.setAttribute('class', 'wave');
        
        // Handle coordinates for both touch and mouse events
        let x, y;
        if (touch && e.touches && e.touches[0]) {
          const rect = element.getBoundingClientRect();
          x = e.touches[0].clientX - rect.left;
          y = e.touches[0].clientY - rect.top;
        } else {
          x = e.offsetX;
          y = e.offsetY;
        }
        
        ripple.style.left = x + 'px';
        ripple.style.top = y + 'px';
        element.appendChild(ripple);
        
        setTimeout(function () {
          ripple.classList.add('is-active');
        }, 0);
        
        ripple.addEventListener('transitionend', function () {
          if (element.contains(ripple)) {
            element.removeChild(ripple);
          }
        });
        
        return ripple;
      };
      
      const cancelRipple = function (ripple) {
        if (ripple && ripple.parentNode) {
          ripple.classList.add('cancelled');
          // Fade out quickly
          ripple.style.transition = 'opacity 0.1s ease-out';
          ripple.style.opacity = '0';
          setTimeout(() => {
            if (ripple.parentNode) {
              ripple.parentNode.removeChild(ripple);
            }
          }, 100);
        }
      };
      
      const resetTouchState = function() {
        touchOccurred = false;
        if (touchCancelTimer) {
          clearTimeout(touchCancelTimer);
          touchCancelTimer = null;
        }
      };
      
      // Touch start handler
      const touchStartHandler = function (e) {
        touchStarted = true;
        touchMoved = false;
        touchOccurred = true;
        
        // Clear any existing timer
        if (touchCancelTimer) {
          clearTimeout(touchCancelTimer);
        }
        
        currentRipple = createRipple.call(this, e, true);
      };
      
      // Touch move handler - cancel ripple if finger moves
      const touchMoveHandler = function (e) {
        if (touchStarted && !touchMoved) {
          touchMoved = true;
          cancelRipple(currentRipple);
          currentRipple = null;
        }
      };
      
      // Touch end handler
      const touchEndHandler = function (e) {
        touchStarted = false;
        // If touch didn't move, let the ripple complete normally
        if (!touchMoved && currentRipple) {
          // Ripple will complete its animation naturally
        }
        currentRipple = null;
        touchMoved = false;
        
        // Set a timer to reset touchOccurred flag after a delay
        // This prevents the subsequent click event from firing
        touchCancelTimer = setTimeout(resetTouchState, 300);
      };
      
      // Touch cancel handler
      const touchCancelHandler = function (e) {
        touchStarted = false;
        cancelRipple(currentRipple);
        currentRipple = null;
        touchMoved = false;
        
        // Set timer to reset touch state
        touchCancelTimer = setTimeout(resetTouchState, 300);
      };
      
      // Click handler for non-touch devices
      const clickHandler = function (e) {
        // Prevent click if a touch event occurred recently
        if (touchOccurred || touchStarted) {
          e.preventDefault();
          return;
        }
        
        // Only trigger on non-touch devices or if touch events aren't supported
        createRipple.call(this, e, false);
      };
      
      // Store handlers for cleanup
      wave._rippleHandlers = {
        touchstart: touchStartHandler,
        touchmove: touchMoveHandler,
        touchend: touchEndHandler,
        touchcancel: touchCancelHandler,
        click: clickHandler
      };
      
      // Add event listeners
      wave.addEventListener("touchstart", touchStartHandler, { passive: true });
      wave.addEventListener("touchmove", touchMoveHandler, { passive: true });
      wave.addEventListener("touchend", touchEndHandler, { passive: true });
      wave.addEventListener("touchcancel", touchCancelHandler, { passive: true });
      wave.addEventListener("click", clickHandler);
    }
  });
};

os.uuid = (length = 10) => {
    const letters = 'ABCDEFGHIJKLMNOPQRSTUVWXYZabcdefghijklmnopqrstuvwxyz';
    const allowedChars = 'ABCDEFGHIJKLMNOPQRSTUVWXYZabcdefghijklmnopqrstuvwxyz0123456789_';

    if (length < 1) {
        return '';
    }

    // Ensure the first character is a letter
    let result = letters.charAt(Math.floor(Math.random() * letters.length));

    // Generate the rest of the string
    for (let i = 1; i < length; i++) {
        result += allowedChars.charAt(Math.floor(Math.random() * allowedChars.length));
    }

g.u.setDefault = (targetObj={}, defaultObj) => {
  for (const key in defaultObj) {
    if (Object.prototype.hasOwnProperty.call(defaultObj, key)) {
      const defaultValue = defaultObj[key];
      const targetValue = targetObj[key];

      if (
        defaultValue && typeof defaultValue === 'object' && !Array.isArray(defaultValue) &&
        targetValue && typeof targetValue === 'object' && !Array.isArray(targetValue)
      ) {
        // Corrected recursive call
        g.u.setDefault(targetValue, defaultValue);
      }
      else if (targetValue === undefined) {
        targetObj[key] = defaultValue;
      }
    }
  }
  return targetObj;
}

g.u.generateTimeFilter = (period) => {
  const now = new Date();
  let startDate;
  let endDate;
  
  // 0 = Sunday, 1 = Monday, 2 = Tuesday, etc.
  const startOfWeekDay = 6; 

  const toSqliteUtcString = (date) => {
    if (!date) return null;
    return date.toISOString().slice(0, 19).replace('T', ' ');
  };

  switch (period) {
    case 'today': {
      startDate = new Date(now);
      startDate.setHours(0, 0, 0, 0);

      endDate = new Date(startDate);
      endDate.setDate(startDate.getDate() + 1);
      break;
    }

    case 'yesterday': {
      startDate = new Date(now);
      startDate.setDate(now.getDate() - 1);
      startDate.setHours(0, 0, 0, 0);

      endDate = new Date(startDate);
      endDate.setDate(startDate.getDate() + 1);
      break;
    }

    case 'this week': {
      startDate = new Date(now);
      startDate.setDate(now.getDate() - (now.getDay() - startOfWeekDay + 7) % 7);
      startDate.setHours(0, 0, 0, 0);

      endDate = new Date(startDate);
      endDate.setDate(startDate.getDate() + 7);
      break;
    }

    case 'last 7 days': {
      startDate = new Date(now);
      startDate.setDate(now.getDate() - 6);
      startDate.setHours(0, 0, 0, 0);

      endDate = new Date(now);
      endDate.setDate(now.getDate() + 1);
      endDate.setHours(0, 0, 0, 0);
      break;
    }
    
    case 'this month': {
      startDate = new Date(now.getFullYear(), now.getMonth(), 1);
      startDate.setHours(0, 0, 0, 0);
      
      endDate = new Date(now.getFullYear(), now.getMonth() + 1, 1);
      endDate.setHours(0, 0, 0, 0);
      break;
    }

    case 'last month': {
      startDate = new Date(now.getFullYear(), now.getMonth() - 1, 1);
      startDate.setHours(0, 0, 0, 0);
      
      endDate = new Date(now.getFullYear(), now.getMonth(), 1);
      endDate.setHours(0, 0, 0, 0);
      break;
    }

    case 'this quarter': {
      const currentQuarter = Math.floor(now.getMonth() / 3);
      const startMonth = currentQuarter * 3;
      
      startDate = new Date(now.getFullYear(), startMonth, 1);
      startDate.setHours(0, 0, 0, 0);
      
      endDate = new Date(now.getFullYear(), startMonth + 3, 1);
      endDate.setHours(0, 0, 0, 0);
      break;
    }

    case 'last quarter': {
      const currentQuarter = Math.floor(now.getMonth() / 3);
      const startMonthOfCurrentQuarter = currentQuarter * 3;
      
      startDate = new Date(now.getFullYear(), startMonthOfCurrentQuarter - 3, 1);
      startDate.setHours(0, 0, 0, 0);
      
      endDate = new Date(now.getFullYear(), startMonthOfCurrentQuarter, 1);
      endDate.setHours(0, 0, 0, 0);
      break;
    }
    
    case 'this year': {
      startDate = new Date(now.getFullYear(), 0, 1);
      startDate.setHours(0, 0, 0, 0);

      endDate = new Date(now.getFullYear() + 1, 0, 1);
      endDate.setHours(0, 0, 0, 0);
      break;
    }
    
    case 'last year': {
      startDate = new Date(now.getFullYear() - 1, 0, 1);
      startDate.setHours(0, 0, 0, 0);
      
      endDate = new Date(now.getFullYear(), 0, 1);
      endDate.setHours(0, 0, 0, 0);
      break;
    }

    case 'all time':
    default:
      return '';
  }

  if (startDate && endDate) {
    const utcStartDate = toSqliteUtcString(startDate);
    const utcEndDate = toSqliteUtcString(endDate);
    return `AND time >= '${utcStartDate}' AND time < '${utcEndDate}'`;
  }

  return '';
};
/**
 * Generates an array of evenly-spaced, "nice" round numbers for a chart's Y-axis.
 * This version dynamically determines the number of ticks to create the most readable labels.
 *
 * @param {number} maxValue - The maximum data value to be displayed on the chart.
 * @param {number} [desiredTicks=10] - The approximate number of intervals you want on the axis.
 * @returns {number[]} An array of numbers for the axis labels, starting from 0.
 */
g.u.getChartAxisLabels = (maxValue, desiredTicks = 10)=> {
  // For this example, handle cases where maxValue might be invalid.
  if (typeof maxValue !== 'number' || maxValue <= 0) {
    // Return a default array for a 0-100 scale.
    return Array.from({ length: 11 }, (_, i) => i * 10);
  }

  // 1. Calculate a rough interval based on the desired number of ticks.
  const roughInterval = maxValue / desiredTicks;

  // 2. Determine a "nice" round interval by using powers of 10.
  const exponent = Math.floor(Math.log10(roughInterval));
  const powerOf10 = Math.pow(10, exponent);
  const normalizedInterval = roughInterval / powerOf10; // A value roughly between 1 and 10

  let niceMultiplier;
  if (normalizedInterval > 5) {
    niceMultiplier = 10;
  } else if (normalizedInterval > 2) {
    niceMultiplier = 5;
  } else if (normalizedInterval > 1) {
    niceMultiplier = 2;
  } else {
    niceMultiplier = 1;
  }

  const niceInterval = niceMultiplier * powerOf10;

  // 3. Calculate the new, rounded maximum value for the chart's axis.
  const roundedMaxValue = Math.ceil(maxValue / niceInterval) * niceInterval;

  // 4. Generate the labels by stepping from 0 to the new max by the nice interval.
  const labels = [];
  for (let i = 0; i <= roundedMaxValue; i += niceInterval) {
    labels.push(i);
  }

  return labels;
}
/**
 * Formats a date string or timestamp into a relative time string.
 * (e.g., "Today", "Yesterday", "Sun", "Mon").
 * Assumes UTC input string if it doesn't have timezone info.
 *
 * @param {string | number} dateInput - The date string (e.g., "2023-10-27 10:30:00") or timestamp.
 * @returns {string} The formatted relative date string.
 */
g.u.formatDate = (dateInput) => {
    // Ensure the input is a Date object.
    // If it's a string without 'Z', append 'Z' to treat it as UTC.
    const date = new Date(
      typeof dateInput === 'string' && !dateInput.endsWith('Z') 
        ? dateInput + 'Z' 
        : dateInput
    );

    const now = new Date();

    // Reset time components to compare dates only
    const today = new Date(now.getFullYear(), now.getMonth(), now.getDate());
    const yesterday = new Date(now.getFullYear(), now.getMonth(), now.getDate() - 1);
    const inputDate = new Date(date.getFullYear(), date.getMonth(), date.getDate());

    // Check for Today
    if (inputDate.getTime() === today.getTime()) {
        return 'Today';
    }

    // Check for Yesterday
    if (inputDate.getTime() === yesterday.getTime()) {
        return 'Yesterday';
    }
    
    // For all other dates, return the day name
    const days = ['Sun', 'Mon', 'Tue', 'Wed', 'Thu', 'Fri', 'Sat'];
    // Use the original 'date' object to get the correct day
    return days[date.getDay()];
};

const schemaQueries = [
  // 1. Create users Table
  `CREATE TABLE IF NOT EXISTS users (
    id INTEGER PRIMARY KEY AUTOINCREMENT,
    email TEXT NOT NULL UNIQUE,
    type TEXT,
    plan TEXT,
    settings TEXT,
    isSynced INTEGER NOT NULL DEFAULT 0,
    created_at TEXT NOT NULL DEFAULT (CURRENT_TIMESTAMP),
    updated_at TEXT NOT NULL DEFAULT (CURRENT_TIMESTAMP)
  );`,

  // 2. Create Trigger for users
  `CREATE TRIGGER IF NOT EXISTS update_users_updated_at
  AFTER UPDATE ON users
  FOR EACH ROW
  BEGIN
    UPDATE users SET updated_at = CURRENT_TIMESTAMP WHERE id = NEW.id;
  END;`,

  // 3. Create tags Table
  `CREATE TABLE IF NOT EXISTS tags (
    id INTEGER PRIMARY KEY AUTOINCREMENT,
    name TEXT NOT NULL UNIQUE,
    isSynced INTEGER NOT NULL DEFAULT 0
  );`,

  // 4. Create services Table
  `CREATE TABLE IF NOT EXISTS services (
    id INTEGER PRIMARY KEY AUTOINCREMENT,
    user_id INTEGER NOT NULL,
    title TEXT NOT NULL,
    description TEXT,
    charge REAL NOT NULL DEFAULT 0.0,
    isSynced INTEGER NOT NULL DEFAULT 0,
    created_at TEXT NOT NULL DEFAULT (CURRENT_TIMESTAMP),
    updated_at TEXT NOT NULL DEFAULT (CURRENT_TIMESTAMP),
    FOREIGN KEY (user_id) REFERENCES users (id) ON DELETE CASCADE
  );`,

  // 5. Create Trigger for services
  `CREATE TRIGGER IF NOT EXISTS update_services_updated_at
  AFTER UPDATE ON services
  FOR EACH ROW
  BEGIN
    UPDATE services SET updated_at = CURRENT_TIMESTAMP WHERE id = NEW.id;
  END;`,

  // 6. Create service_tags Junction Table
  `CREATE TABLE IF NOT EXISTS service_tags (
    service_id INTEGER NOT NULL,
    tag_id INTEGER NOT NULL,
    isSynced INTEGER NOT NULL DEFAULT 0,
    PRIMARY KEY (service_id, tag_id),
    FOREIGN KEY (service_id) REFERENCES services (id) ON DELETE CASCADE,
    FOREIGN KEY (tag_id) REFERENCES tags (id) ON DELETE CASCADE
  );`
];
// Function to execute all schema queries sequentially.
async function setupDatabase() {
  console.log("Setting up database schema...");
  for (const query of schemaQueries) {
    try {
      // Execute each query one by one.
      await os.sqlite.query(query);
      console.log("Successfully executed a query.");
    } catch (error) {
      console.error("Failed to execute query:", error);
      console.error("Problematic Query:", query);
      // Stop execution if one query fails.
      return; 
    }
  }
  console.log("Database schema setup complete.");
}

            <ol>
                <li>Online database sync manually 2 times daily allowed</li>
                <li>Single shop management</li>
                <li>Up to 1,000 records per month</li>
                <li>Standard reporting</li>
            </ol>
        </v>

        <v ref=pro poa mx30 c bgueg c15 w250 tn3>
            <h f40>Pro</h>
            <ol>
                <li>Records pay as you go</li>
                <li>Multi-shop (3) support</li>
                <li>Membership features (3)</li>
                <li>Advanced analytics</li>
                <li>Priority email support</li>
            </ol>
        </v>

        <v ref=ultra poa mx30 c bgdeg c15 w250 tn3>
            <h f40>Ultra</h>
            <ol>
                <li>Unlimited records</li>
                <li>Unlimited members</li>
                <li>Unlimited shops</li>
                <li>Full API access</li>
                <li>Advanced analytics</li>
            </ol>
        </v>

        <h poa b15 c>
            <mi ref=back>arrow_back_ios</mi>
            <v ref=choosePlan mx30 px30 py10 bgo c5>Choose Plan</v>
            <mi ref=forward>arrow_forward_ios</mi>
        </h>

    </h>
    `);

    const plans = [free, basic, pro, ultra];
    let currentIndex = userActivePlanIndex;
    const maxIndex = plans.length - 1;

    const updateChooseButton = () => {
        if (currentIndex === userActivePlanIndex) {
            choosePlan.ih = 'Current Plan';
            choosePlan.style.opacity = '0.6';
        } else {
            choosePlan.ih = 'Choose Plan';
            choosePlan.style.opacity = '1';
        }
    };

    const updateNavButtons = () => {
        back.style.opacity = currentIndex === 0 ? '0.4' : '1';
        forward.style.opacity = currentIndex === maxIndex ? '0.4' : '1';
    };
    
    const initializeView = () => {
        plans.forEach((plan, index) => {
            if (index === currentIndex) {
                plan.atr('tx-200p', 'tx200p').ats('tx0p');
            } else {
                plan.atr('tx0p');
                if (index < currentIndex) {
                    plan.ats('tx-200p');
                } else {
                    plan.ats('tx200p');
                }
            }
        });

        updateNavButtons();
        updateChooseButton();
    };

    forward.C = () => {
        if (currentIndex >= maxIndex) return;
        plans[currentIndex].atr('tx0p').ats('tx-200p');
        plans[currentIndex + 1].atr('tx200p').ats('tx0p');
        currentIndex++;
        updateNavButtons();
        updateChooseButton();
    };

    back.C = () => {
        if (currentIndex <= 0) return;
        plans[currentIndex].atr('tx0p').ats('tx200p');
        plans[currentIndex - 1].atr('tx-200p').ats('tx0p');
        currentIndex--;
        updateNavButtons();
        updateChooseButton();
    };
    
    choosePlan.C = v => {
        if (currentIndex !== userActivePlanIndex) {
g.ad.query(`UPDATE users
SET plan_request = ${currentIndex}, plan_requested_at = CURRENT_TIMESTAMP
WHERE id = ${id}`, v=>{
os.alert(`Your plan request has been sent. Wait for confirmation`)
})
        }
    };
    
    initializeView();
}

function onClickItem(item, element) {
    var win = g.components.win();

    const {
        desc
    } = win.create(`Note Editor`, `
    <v h100p>
        <textarea ref=desc p15 h100p otn bgaaaa ra0 clzzz></textarea>
    </v>
    `);

    desc.addEventListener('keydown', (e) => {
        if (e.key === 'Enter') {
            const cursorPosition = desc.selectionStart;
            const text = desc.value;
            const lineStartIndex = text.lastIndexOf('\n', cursorPosition - 1) + 1;
            const currentLine = text.substring(lineStartIndex, cursorPosition);

            const emptyListRegex = /^\s*(\d+)\.\s*$/;
            if (emptyListRegex.test(currentLine)) {
                e.preventDefault();
                const textBeforeLine = text.substring(0, lineStartIndex);
                const textAfterCursor = text.substring(cursorPosition);
                desc.value = textBeforeLine + textAfterCursor;
                desc.selectionStart = desc.selectionEnd = lineStartIndex;
                return;
            }

            const listPrefixRegex = /^(\s*\d+)\.\s/;
            const prefixMatch = currentLine.match(listPrefixRegex);

            if (prefixMatch) {
                e.preventDefault();
                const numberBlock = prefixMatch[1];
                const currentWidth = numberBlock.length;
                const minWidth = 3;
                const targetWidth = Math.max(currentWidth, minWidth);
                const currentNumber = parseInt(numberBlock, 10);
                const nextNumber = currentNumber + 1;
                const newNumberBlock = String(nextNumber).padStart(targetWidth, ' ');
                const newListItem = `\n${newNumberBlock}. `;

                if (currentWidth < minWidth) {
                    const paddingToAdd = ' '.repeat(targetWidth - currentWidth);
                    const textBeforeLine = text.substring(0, lineStartIndex);
                    const textOnLineToCursor = text.substring(lineStartIndex, cursorPosition);
                    const textAfterCursor = text.substring(cursorPosition);
                    desc.value = textBeforeLine + paddingToAdd + textOnLineToCursor + newListItem + textAfterCursor;
                    const newCursorPosition = cursorPosition + paddingToAdd.length + newListItem.length;
                    desc.selectionStart = desc.selectionEnd = newCursorPosition;
                } else {
                    const textBefore = text.substring(0, cursorPosition);
                    const textAfter = text.substring(cursorPosition);
                    desc.value = textBefore + newListItem + textAfter;
                    const newCursorPosition = cursorPosition + newListItem.length;
                    desc.selectionStart = desc.selectionEnd = newCursorPosition;
                }
            }
        }
    });

    desc.addEventListener('input', () => {
        const cursorPosition = desc.selectionStart;
        const text = desc.value;
        const lineStartIndex = text.lastIndexOf('\n', cursorPosition - 1) + 1;
        const currentLineToCursor = text.substring(lineStartIndex, cursorPosition);

        const listTriggerRegex = /^(\d+)\.\s$/;
        const match = currentLineToCursor.match(listTriggerRegex);

        if (match) {
            const numberBlock = match[1];
            const currentWidth = numberBlock.length;
            const minWidth = 3;

            if (currentWidth < minWidth) {
                const paddingToAdd = ' '.repeat(minWidth - currentWidth);
                const textBeforeLine = text.substring(0, lineStartIndex);
                const textAfterCursor = text.substring(cursorPosition);
                const formattedLine = paddingToAdd + currentLineToCursor;
                desc.value = textBeforeLine + formattedLine + textAfterCursor;
                const newCursorPosition = lineStartIndex + formattedLine.length;
                desc.selectionStart = desc.selectionEnd = newCursorPosition;
            }
        }
    });

    // MODIFIED: Ensures two newlines on load.
    desc.value = `${item.title}\n\n${item.description || ''}`;

    // Use the untrimmed value to preserve initial state.
    const prevNote = desc.value;

    let ttl = '';
    let dsc = 'null';

    // MODIFIED: Corrected saving logic.
    win.onClose(() => {
        const txt = desc.value; // Get the raw value without trimming.

        // Only compare trimmed versions to prevent saving on minor whitespace changes.
        if (prevNote.trim() === txt.trim()) {
            return;
        }

        if (txt.trim() === '') {
            deleteNote();
        } else {
            const firstLineBreakIndex = txt.indexOf('\n');

            if (firstLineBreakIndex === -1) {
                // If no line break, the whole text is the title.
                ttl = txt;
                dsc = null;
            } else {
                // Title is everything before the first line break.
                ttl = txt.substring(0, firstLineBreakIndex);
                // Description is everything after, preserving all whitespace.
                const descriptionText = txt.substring(firstLineBreakIndex + 1);

                // Only save the description if it contains non-whitespace characters.
                if (descriptionText.trim() === '') {
                    dsc = null;
                } else {
                    dsc = `'${g.u.toSqlString(descriptionText)}'`;
                }
            }
            updateNote();
        }

        return {
            shouldClose: false
        };
    });


    const updateNote = () => {
        popup.message(
            `Update Note`,
            `<v p15>Click Ok to Update the note</v>`, {
                onOk: v => {
                    win.onClose(v => ({
                        shouldClose: true
                    }));
                    win.close();
                    loader.start(element);
                    g.ad.query(`update notes set title='${g.u.toSqlString(ttl)}' , description = ${dsc} where id = ${item.id} returning *`, v => {
                        const updatedItem = v.rows[0];
                        list.updateItem(updatedItem, element);
                        loader.stop();
                    }, v => {
                        os.alert(`Something went wrong. Probably network problem`);
                        loader.stop();
                        list.updateItem(item, element);
                    });
                },
                onCancel: v => {
                    win.onClose(v => ({
                        shouldClose: true
                    }));
                    win.close();
                }
            }
        );
    };

    const deleteNote = () => {
        popup.message(
            `Delete Note`,
            `<v p15>Click Ok to Delete the note</v>`, {
                onOk: v => {
                    win.onClose(v => ({
                        shouldClose: true
                    }));
                    win.close();
                    loader.start(element);
                    g.ad.query(`delete from notes where id = ${item.id}`, v => {
                        total.it = total.it * 1 - 1;
                        element.atsa(`azo`);
                        af(300, v => element.remove());
                    }, v => {
                        loader.stop();
                        os.alert(`Something went wrong. Probably network problem`);
                        list.updateItem(item, element);
                    });
                },
                onCancel: v => {
                    win.onClose(v => ({
                        shouldClose: true
                    }));
                    win.close();
                }
            }
        );
    };
}
